services:
  - type: web
    name: hhk-digital
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn hhk_core.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: DJANGO_SETTINGS_MODULE
        value: hhk_core.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hhk-db
          property: connectionString

databases:
  - name: hhk-db
    plan: free
